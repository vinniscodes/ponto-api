# CONFIGURAÇÃO DE PORTA (Resolve o erro "No open ports detected")
server.port=${PORT:8080}

# CONFIGURAÇÃO DE BANCO DE DATOS (H2 local / PostgreSQL na Nuvem)
spring.datasource.url=${DB_URL:jdbc:h2:mem:pontodb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / HIBERNATE (RN-001: Imutabilidade e Criação de Tabelas)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DIALETO (O Spring detecta o Postgres sozinho, mas deixamos flexível)
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}

# SEGURANÇA HIKARI (Evita quedas de conexão no plano Free)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# LGPD: Configuração de fuso horário para bater o ponto certinho
spring.jackson.time-zone=America/Recife