# CONFIGURACAO DE PORTA
server.port=${PORT:8080}

# CONFIGURACAO DE BANCO DE DATOS
spring.datasource.url=${DB_URL:jdbc:h2:mem:pontodb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}


spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# LGPD: Fuso horario
spring.jackson.time-zone=America/Recife